on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * 1"

permissions:
  contents: write

jobs:
  render-public-eval:
    runs-on: ubuntu-latest

    env:
      GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up R
        uses: r-lib/actions/setup-r@v2

      - name: Set up Pandoc
        uses: r-lib/actions/setup-pandoc@v2

      - name: Install R package dependencies
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          working-directory: evaluation/r_scripts
          packages: |
            any::dplyr
            any::ggplot2
            any::googlesheets4
            any::knitr
            any::rmarkdown
            any::rlang
            any::tibble
            any::gt

      - name: Verify packages
        run: |
          Rscript -e "library(rmarkdown)"
          Rscript -e "library(dplyr)"
          Rscript -e "library(googlesheets4)"

      - name: Write Google service account JSON
        shell: bash
        run: |
          printf '%s' "$GOOGLE_SERVICE_ACCOUNT_JSON" > evaluation/r_scripts/google_sheets_service_account.json

      - name: Debug files
        run: |
          pwd
          ls -la
          ls -la evaluation
          ls -la evaluation/r_scripts

      - name: Render public evaluation report
        run: |
          Rscript evaluation/r_scripts/render_report.R

      - name: Commit updated evaluation outputs
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add evaluation/eval_output

          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git commit -m "Update public evaluation report"

          git pull --rebase origin main
          git push